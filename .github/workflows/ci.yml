name: CI

on:
  pull_request:
    branches: [main]

# Only run CI on PRs opened or approved by the repo owner.
# External / bot PRs must be explicitly approved by mvb0005 before CI fires.
jobs:
  backend:
    name: Backend – Lint, Type Check & Test
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'mvb0005' ||
      github.event.pull_request.head.repo.full_name == 'mvb0005/syllabi'

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff – lint
        run: ruff check .

      - name: Ruff – format check
        run: ruff format --check .

      - name: mypy – strict type check
        run: mypy --strict .

      - name: pytest
        run: pytest --tb=short -q

  frontend:
    name: Frontend – Type Check & Lint
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'mvb0005' ||
      github.event.pull_request.head.repo.full_name == 'mvb0005/syllabi'

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src --max-warnings 0
