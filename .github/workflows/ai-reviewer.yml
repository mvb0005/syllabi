name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    name: AI PR Review (CodeRabbit)
    runs-on: ubuntu-latest
    # Only run after CI passes — no point reviewing broken code
    needs: []
    if: >
      github.event.pull_request.draft == false &&
      (github.event.pull_request.user.login == 'mvb0005' ||
       github.event.pull_request.head.repo.full_name == 'mvb0005/syllabi')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # CodeRabbit posts inline comments directly on the PR.
      # Configure via .coderabbit.yaml in the repo root.
      # Docs: https://docs.coderabbit.ai
      - name: CodeRabbit AI Review
        uses: coderabbitai/ai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          review_simple_changes: false
          review_comment_lgtm: false
